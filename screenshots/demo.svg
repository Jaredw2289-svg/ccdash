<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" font-family="'SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas','Menlo',monospace" font-size="13">
  <style>
    @keyframes fadeIn1 { 0%,5% { opacity:0 } 10%,100% { opacity:1 } }
    @keyframes fadeIn2 { 0%,15% { opacity:0 } 20%,100% { opacity:1 } }
    @keyframes fadeIn3 { 0%,25% { opacity:0 } 30%,100% { opacity:1 } }
    @keyframes fadeIn4 { 0%,35% { opacity:0 } 40%,100% { opacity:1 } }
    @keyframes cursor { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
    @keyframes barFill1 { 0%,10% { width:0 } 25%,100% { width:108px } }
    @keyframes barFill2 { 0%,20% { width:0 } 35%,100% { width:72px } }
    @keyframes barFill3 { 0%,25% { width:0 } 40%,100% { width:90px } }
    @keyframes goalType {
      0%,30% { width: 0 }
      60%,100% { width: 340px }
    }
    @keyframes nowType {
      0%,40% { width: 0 }
      70%,100% { width: 280px }
    }
    @keyframes promptBlink { 0%,49% { opacity:1 } 50%,99% { opacity:0 } 100% { opacity:1 } }
    .line1 { animation: fadeIn1 4s ease both; }
    .line2 { animation: fadeIn2 4s ease both; }
    .line3 { animation: fadeIn3 4s ease both; }
    .line4 { animation: fadeIn4 4s ease both; }
  </style>

  <!-- Terminal background -->
  <rect width="920" height="280" rx="10" fill="#1a1b26"/>

  <!-- Title bar -->
  <rect width="920" height="36" rx="10" fill="#24283b"/>
  <rect y="26" width="920" height="10" fill="#24283b"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="460" y="22" text-anchor="middle" fill="#565f89" font-size="12">claude — dashcc</text>

  <!-- Prompt area -->
  <text x="20" y="60" fill="#565f89" font-size="12">❯</text>
  <rect x="34" y="50" width="2" height="14" fill="#7aa2f7" opacity="0.8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Separator line -->
  <line x1="12" y1="74" x2="908" y2="74" stroke="#3b4261" stroke-width="1"/>

  <!-- Line 1: Model info -->
  <g class="line1">
    <text y="96" x="20" fill="#bb9af7">Opus 4.6</text>
    <text y="96" x="95" fill="#565f89">·</text>
    <text y="96" x="110" fill="#9ece6a">1hr 24m</text>
    <text y="96" x="185" fill="#565f89">·</text>
    <text y="96" x="200" fill="#e0af68">Session spending: $15.78</text>
    <text y="96" x="420" fill="#565f89">·</text>
    <!-- Context bar -->
    <rect x="436" y="86" width="180" height="14" rx="3" fill="#3b4261"/>
    <rect x="436" y="86" rx="3" height="14" fill="#9ece6a">
      <animate attributeName="width" from="0" to="108" dur="1.5s" begin="0.5s" fill="freeze"/>
    </rect>
    <text y="96" x="626" fill="#a9b1d6">63k/200k (32%)</text>
  </g>

  <!-- Line 2: Usage -->
  <g class="line2">
    <text y="126" x="20" fill="#7aa2f7">Session:</text>
    <rect x="90" y="116" width="150" height="14" rx="3" fill="#3b4261"/>
    <rect x="90" y="116" rx="3" height="14" fill="#7dcfff">
      <animate attributeName="width" from="0" to="72" dur="1.5s" begin="0.8s" fill="freeze"/>
    </rect>
    <text y="126" x="248" fill="#a9b1d6">26.0%</text>
    <text y="126" x="295" fill="#565f89">·</text>
    <text y="126" x="310" fill="#a9b1d6">0h19m left</text>
    <text y="126" x="405" fill="#565f89">·</text>
    <text y="126" x="420" fill="#7aa2f7">Weekly:</text>
    <rect x="485" y="116" width="150" height="14" rx="3" fill="#3b4261"/>
    <rect x="485" y="116" rx="3" height="14" fill="#e0af68">
      <animate attributeName="width" from="0" to="90" dur="1.5s" begin="1.1s" fill="freeze"/>
    </rect>
    <text y="126" x="643" fill="#a9b1d6">28.0%</text>
    <text y="126" x="690" fill="#565f89">·</text>
    <text y="126" x="705" fill="#a9b1d6">resets Thu 10pm</text>
  </g>

  <!-- Line 3: Goal -->
  <g class="line3">
    <text y="156" x="20" fill="#9ece6a">ccdash</text>
    <text y="156" x="73" fill="#565f89">·</text>
    <text y="156" x="88" fill="#e0af68">Goal:</text>
    <g clip-path="url(#goalClip)">
      <clipPath id="goalClip">
        <rect x="130" y="142" height="20">
          <animate attributeName="width" from="0" to="420" dur="2s" begin="1.5s" fill="freeze"/>
        </rect>
      </clipPath>
      <text y="156" x="130" fill="#a9b1d6">Publish dashcc to npm and make it work globally</text>
    </g>
  </g>

  <!-- Line 4: Now -->
  <g class="line4">
    <text y="186" x="20" fill="#e0af68">Now:</text>
    <g clip-path="url(#nowClip)">
      <clipPath id="nowClip">
        <rect x="55" y="172" height="20">
          <animate attributeName="width" from="0" to="380" dur="2s" begin="2s" fill="freeze"/>
        </rect>
      </clipPath>
      <text y="186" x="55" fill="#a9b1d6">Added --install and --uninstall CLI flags</text>
    </g>
  </g>

  <!-- Bottom prompt -->
  <line x1="12" y1="204" x2="908" y2="204" stroke="#3b4261" stroke-width="1"/>
  <g class="line4">
    <text y="228" x="20" fill="#f7768e">▸▸</text>
    <text y="228" x="46" fill="#bb9af7">bypass permissions on</text>
    <text y="228" x="230" fill="#565f89">(shift+tab to cycle)</text>
  </g>

  <!-- Subtle glow effect on bars -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>